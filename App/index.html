<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria — Learn with Intention</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">MEMORIA</div>
            <nav class="sidebar-nav">
                <a data-view="home" class="active" onclick="navigateTo('home')">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
                    <span>Projects</span>
                </a>
                <a data-view="settings" onclick="navigateTo('settings')">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="theme-toggle-row" onclick="cycleTheme()" title="Toggle theme (Light / Dark / Auto)">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <span>Theme</span>
                    <span class="theme-dot" id="themeDot"></span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <!-- Home View -->
            <div id="view-home" class="fade-in">
                <div class="main-header">
                    <h1>Your Projects</h1>
                    <button class="btn-new-project" onclick="openNewProjectPopup()">+ New Project</button>
                </div>
                <div class="project-grid" id="projectGrid">
                    <div class="empty-state">No projects yet. Create one to begin your journey.</div>
                </div>
            </div>

            <!-- Settings View -->
            <div id="view-settings" class="hidden fade-in">
                <div class="main-header">
                    <h1>Settings</h1>
                    <div></div>
                </div>
                <div style="padding:2rem;overflow-y:auto;flex:1;">
                    <div class="settings-section">
                        <h3>Custom Moods</h3>
                        <p style="font-size:0.75rem;color:var(--text-muted);margin-bottom:1rem;letter-spacing:0.03em;">
                            Create moods for highlighting script lines. Assign a name and colour.
                        </p>
                        <div id="moodListContainer"></div>
                        <button class="btn-add-mood" onclick="addMoodRow()">+ Add Mood</button>
                    </div>
                </div>
            </div>

            <!-- Project Detail View -->
            <div id="view-project" class="hidden project-view fade-in">
                <div class="project-view-header">
                    <div class="pv-title-group">
                        <h2 id="pvTitle">Project</h2>
                        <span class="pv-badge" id="pvBadge"></span>
                    </div>
                    <button class="btn-exit" onclick="exitProject()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        Exit
                    </button>
                </div>
                <div class="project-view-body" id="pvBody">
                    <!-- Dynamically filled -->
                </div>
            </div>
        </main>
    </div>

    <!-- New Project Pop-up -->
    <div class="popup-overlay" id="newProjectOverlay">
        <div class="popup-dialog">
            <div class="popup-header">
                <h2 id="popupTitle">New Project</h2>
                <button class="popup-close" onclick="closeNewProjectPopup()">&times;</button>
            </div>
            <div class="popup-body" id="popupBody">
                <div id="popupStep1"> ... </div>
                <div id="popupStep2" class="hidden"> ... </div>
            </div>
        </div>
    </div>

    <!-- Add Content Modal -->
    <div class="input-modal-overlay" id="inputModalOverlay">
        <div class="input-modal" id="inputModal"></div>
    </div>

    <!-- Study Mode Modal -->
    <div class="input-modal-overlay" id="studyModalOverlay">
        <div class="input-modal" id="studyModal"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
